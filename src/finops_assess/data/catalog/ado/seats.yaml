# Azure DevOps access-level / add-on SKUs.

- id: ADO.STAKEHOLDER
  display_name: Azure DevOps Stakeholder
  family: ado_seat
  cloud: ado
  list_price_usd_month: 0.00
  source_url: https://azure.microsoft.com/en-us/pricing/details/devops/azure-devops-services/
  features:
    - ado.boards.read
    - ado.work_items.basic

- id: ADO.BASIC
  display_name: Azure DevOps Basic
  family: ado_seat
  cloud: ado
  list_price_usd_month: 6.00
  source_url: https://azure.microsoft.com/en-us/pricing/details/devops/azure-devops-services/
  features:
    - ado.boards.full
    - ado.repos.full
    - ado.pipelines.full
  successor_of: [ADO.STAKEHOLDER]

- id: ADO.BASIC_TEST
  display_name: Azure DevOps Basic + Test Plans
  family: ado_seat
  cloud: ado
  list_price_usd_month: 52.00
  source_url: https://azure.microsoft.com/en-us/pricing/details/devops/azure-devops-services/
  features:
    - ado.boards.full
    - ado.repos.full
    - ado.pipelines.full
    - ado.test_plans
  successor_of: [ADO.BASIC]

