# GitHub savings-rule skeletons. See docs/plan.md §6.

- id: GH.INACTIVE_SEAT_90D
  surface: github
  severity: high
  summary: Enterprise / Business seat with no activity in 90 days.
  recommendation_template: >
    {principal} has had no commits, reviews, issue activity, or
    sign-ins in 90 days. Reclaim the {current_sku} seat.
  inactivity_days: 90

- id: GH.COPILOT_INACTIVE_30D
  surface: github
  severity: high
  summary: Copilot Business / Enterprise seat with no acceptances in 30 days.
  recommendation_template: >
    {principal} holds a Copilot seat but has accepted zero
    suggestions in 30 days. Reassign or remove the seat.
  inactivity_days: 30

- id: GH.GHAS_OVER_PROVISIONED
  surface: github
  severity: medium
  summary: Advanced Security committer count exceeds active-scanning repos.
  recommendation_template: >
    GHAS is enabled on {ghas_repo_count} repositories with
    {active_committers} unique committers in the last 90 days, but
    only {actively_scanned} repos have produced an alert. Disable
    GHAS on inactive repos to reduce billable committers.

- id: GH.RUNNER_TIER_MISMATCH
  surface: github
  severity: low
  summary: Runner-minute spend is materially over or under the current SKU's included quota.
  recommendation_template: >
    The org consumed {used_minutes} runner-minutes in the last
    billing period against {included_minutes} included minutes.
    {tier_action_recommendation}
