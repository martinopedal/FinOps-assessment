# Microsoft 365 Enterprise SKUs.
# Seeded from publicly documented service-plan IDs and the M365 Maps
# taxonomy (https://m365maps.com/). Prices are list USD/user/month and
# may lag retail; prefer the catalog loader's `list_price_usd_month: null`
# over a stale value when in doubt.

