name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Preflight (Windows): probe Pool W-pub for the Windows leg of the matrix.
  # See martinopedal/personal-runners-infra/docs/WINDOWS-PREFLIGHT.md.
  # ---------------------------------------------------------------------------
  preflight-windows:
    uses: martinopedal/personal-runners-infra/.github/workflows/runner-preflight.yml@main
    with:
      os: windows
      desired_label: alz-w-pub
      min_online: 1

  lint-and-test:
    name: Lint, type-check, test (${{ matrix.os }} / py${{ matrix.python-version }})
    needs: [preflight-windows]
    # Cross-OS dispatch: Windows leg routes via preflight; ubuntu/macos use the
    # literal matrix value. matrix.os is preserved verbatim so any downstream
    # `if: matrix.os == '...'` check (none today, but future-proof) keeps working.
    runs-on: >-
      ${{ matrix.os == 'windows-latest'
          && fromJSON(needs.preflight-windows.outputs.runner_label)
          || matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,live]"

      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .

      - name: Mypy
        run: mypy src

      - name: Pytest
        run: pytest --cov=finops_assess --cov-report=term-missing

      - name: Smoke-test CLI (cross-platform)
        run: finops-assess validate

  catalog-validation:
    name: Validate YAML catalog & rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Validate catalog YAML
        run: python -m finops_assess.catalog validate
      - name: Validate personas + rules
        run: python -m finops_assess.rules validate

  required-checks:
    # Single summary check published as the literal context
    # `required-checks`. Branch protection on `main` requires this one
    # context (see issue #51); decoupling protection from matrix
    # dimensions means adding/removing OS or Python versions in
    # `lint-and-test` does not break protection. When a new top-level
    # job is added to this workflow it MUST be appended to `needs:`
    # below, otherwise the summary will pass while the new job runs
    # ungated.
    name: required-checks
    runs-on: ubuntu-latest
    # preflight-windows is included so the summary gate fails if the preflight
    # itself errors (e.g. reusable workflow can't be resolved). Per-OS preflight
    # design returns a fallback rather than failing in normal operation, but a
    # workflow-resolution failure must not pass silently.
    needs: [lint-and-test, catalog-validation, preflight-windows]
    if: always()
    steps:
      - name: Assert all required jobs succeeded
        uses: actions/github-script@v9
        with:
          script: |
            const needs = ${{ toJSON(needs) }};
            const failed = Object.entries(needs)
              .filter(([, job]) => job.result !== 'success')
              .map(([name, job]) => `${name}=${job.result}`);
            if (failed.length > 0) {
              core.setFailed(
                `Required upstream jobs did not all succeed: ${failed.join(', ')}`
              );
            } else {
              core.info('All required upstream jobs succeeded.');
            }
